services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_HOST=pecn8n.westus2.cloudapp.azure.com
      - WEBHOOK_URL=https://pecn8n.westus2.cloudapp.azure.com:9443/
      - N8N_EDITOR_BASE_URL=https://pecn8n.westus2.cloudapp.azure.com:9443/
      - GENERIC_TIMEZONE=America/Los_Angeles
      - TZ=America/Los_Angeles
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=pdf-lib,@azure/communication-email
      - N8N_RUNNERS_ENABLED=false
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - ai-network
    depends_on:
      - pdf-splitter

  pdf-splitter:
    build: ./pdf-splitter
    container_name: pdf-splitter
    restart: unless-stopped
    networks:
      - ai-network

  frontend:
    build: /opt/deployment/code/frontend
    container_name: frontend
    restart: unless-stopped
    networks:
      - ai-network

  iic:
    build:
      context: /opt/deployment/code/iic
      dockerfile: Dockerfile
    container_name: iic
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    ports:
      - "8501:8501"
    networks:
      - ai-network
    volumes:
      - /opt/deployment/code/iic/.env:/app/.env:ro

  acs-email:
    image: node:20
    container_name: acs-email
    working_dir: /app
    command: sh -c "npm install express @azure/communication-email && node server.js"
    volumes:
      - ./acs-email-service:/app
    environment:
      - ACS_CONNECTION_STRING=${ACS_CONNECTION_STRING}
      - SENDER_ADDRESS=${SENDER_ADDRESS:-DoNotReply@billing.pecalum.com}
    networks:
      - ai-network

  # NEW: Asana Task Service
  asana-task:
    build: ./src/asana_task_service
    container_name: asana-task
    restart: unless-stopped
    environment:
      - ASANA_TOKEN=${ASANA_TOKEN}
      - ASANA_PROJECT_ID=${ASANA_PROJECT_ID}
      - ASANA_WORKSPACE_ID=${ASANA_WORKSPACE_ID:-}
    networks:
      - ai-network

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9443:9443"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - ai-network
    depends_on:
      - n8n
      - frontend
      - iic
      - asana-task  # ADD THIS

networks:
  ai-network:
    driver: bridge
